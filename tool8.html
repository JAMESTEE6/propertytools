<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🏦 Bank Q&A Knowledge Base</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif;}
        body {background-color: #f5f7fa; padding: 40px 25px; line-height: 1.6;}
        
        /* ✅ 頂部導航欄（與你系統一致） */
        .header-bar { 
            background: #bfff00; padding: 15px 25px; 
            display: flex; justify-content: space-between; 
            align-items: center; flex-wrap: wrap; gap: 12px;
            position: fixed; top:0; left:0; width:100%; z-index:99;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .user-info { 
            font-size: 16px; font-weight: 600; color: #000; 
        }
        .logout-btn { 
            background: #dc2626; color: #fff; border: none; 
            padding: 8px 16px; border-radius: 6px; 
            font-size: 15px; font-weight: 500; cursor: pointer; 
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #b91c1c; }

        /* ✅ 主容器 */
        .container {max-width: 1200px; margin: 80px auto 0;}
        .page-header {text-align: center; margin-bottom: 40px;}
        .page-header h1 {font-size: 32px; color: #1e293b; margin-bottom: 8px;}
        .page-header p {color: #64748b; font-size: 16px;}

        /* ✅ 搜尋+篩選區塊：全新排版 */
        .filter-section {
            background: #ffffff;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            align-items: center;
        }
        .filter-row-2 {
            grid-template-columns: 2fr 1fr 1fr;
            margin-top: 15px;
        }
        input, select {
            width: 100%; padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: #fafbfc;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* ✅ 統計資訊：全新樣式 */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: #eef2ff;
            color: #3b82f6;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-item::before {
            content: "●";
            font-size: 10px;
        }

        /* ✅ 銀行卡片：全新設計！現代、簡約、專業 */
        .banks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }
        .bank-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }
        .bank-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .card-header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bank-badge {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px;
            backdrop-filter: blur(5px);
        }
        .bank-name {
            font-size: 18px; font-weight: 600;
        }

        /* ✅ Q&A 項目：全新風格 */
        .qa-container {padding: 18px 22px;}
        .qa-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-left: 4px solid #3b82f6;
        }
        .question {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .answer {
            color: #475569;
            font-size: 13px;
            line-height: 1.5;
        }

        /* ✅ 展開按鈕：全新樣式 */
        .expand-btn {
            width: 100%;
            padding: 10px;
            background: #f1f5f9;
            border: none;
            color: #3b82f6;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 0 0 12px 12px;
        }
        .expand-btn:hover {background: #e2e8f0;}

        /* ✅ 返回連結 */
        .back-link {text-align:center; margin-top:40px;}
        .back-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            padding: 10px 20px;
            background: #eef2ff;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .back-link a:hover {
            background: #dbeafe;
            text-decoration: underline;
        }

        /* ✅ 響應式 */
        @media (max-width: 768px) {
            .filter-section, .filter-row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>
        const 試算表ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        const QA_SHEET = "銀行Q&A"; // ✅ 你的資料分頁

        // ✅ 時間格式
        function getMYTime() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }

        // ✅ 頁面載入
        window.onload = function() {
            if(!localStorage.getItem("IS_LOGIN")) {
                alert("⚠️ 請先登入！");
                window.location.href = "index.html";
                return;
            }
            const user = localStorage.getItem("loginAccount") || "";
            const last = localStorage.getItem("LAST_LOGIN") || "First Time Login";
            document.getElementById("loginDisplay").innerHTML = `Welcome: ${user}<br>LOGIN TIME: ${getMYTime()}<br>LAST LOGIN TIME: ${last}`;

            loadBankQAData(); // 載入所有資料
        };

        // ✅ 登出
        function logout() {
            if(localStorage.getItem("loginAccount")) {
                fetch("https://script.google.com/macros/s/AKfycbyrNpc319JdgcvJVR-9z006G3tZdGtehyTjqKo3h8kGyaqxl2iBXoNMB7xuYhRcod8r/exec", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({time:getMYTime(), user:localStorage.getItem("loginAccount"), action:"登出系統"}),
                    redirect:"follow"
                });
            }
            localStorage.clear();
            location.href = "index.html";
        }

        // ✅ 從 Google Sheet 讀取資料（功能不變）
        async function loadBankQAData() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${試算表ID}/export?format=csv&sheet=${encodeURIComponent(QA_SHEET)}`);
                const csv = await res.text();
                const rows = csv.split("\n").filter(r => r.trim());
                const data = rows.slice(1).map(r => {
                    const cols = r.split(",");
                    return {
                        category: cols[0] || "",
                        bank: cols[1] || "",
                        question: cols[2] || "",
                        answer: cols[3] || "",
                        topic: cols[4] || "",
                        status: cols[5] || "Active"
                    };
                });

                // 統計數字
                const uniqueBanks = [...new Set(data.map(d => d.bank))].filter(Boolean);
                document.getElementById("statBanks").textContent = `${uniqueBanks.length} Banks Available`;
                document.getElementById("statQA").textContent = `${data.length} Q&A Entries`;

                renderBankCards(data); // 渲染卡片
                initFilters(data);     // 初始化篩選

            } catch(e) {
                document.getElementById("gridArea").innerHTML = "<p style='text-align:center; color:#ef4444; padding:40px;'>⚠️ Failed to load data. Please check your Google Sheet.</p>";
            }
        }

        // ✅ 渲染銀行卡片（功能不變，外觀全新）
        function renderBankCards(allData) {
            const grid = document.getElementById("gridArea");
            grid.innerHTML = "";

            // 按銀行分組
            const groupByBank = {};
            allData.forEach(item => {
                if(!groupByBank[item.bank]) groupByBank[item.bank] = [];
                groupByBank[item.bank].push(item);
            });

            // 建立卡片
            Object.keys(groupByBank).sort().forEach(bankName => {
                const list = groupByBank[bankName];
                const initial = bankName.substring(0,2).toUpperCase(); // 前兩字母

                const card = document.createElement("div");
                card.className = "bank-card";
                card.dataset.fullList = JSON.stringify(list); // 儲存完整資料

                card.innerHTML = `
                    <div class="card-header">
                        <div class="bank-badge">${initial}</div>
                        <div class="bank-name">${bankName}</div>
                    </div>
                    <div class="qa-container" id="list-${bankName}">
                        ${list.slice(0,3).map(q => `
                            <div class="qa-item">
                                <div class="question">${q.question}</div>
                                <div class="answer">${q.answer}</div>
                            </div>
                        `).join("")}
                    </div>
                    ${list.length > 3 ? `<button class="expand-btn" onclick="toggleAll('${bankName}')">View all ${list.length} entries ↓</button>` : ""}
                `;
                grid.appendChild(card);
            });
        }

        // ✅ 展開/收合（功能完全不變）
        function toggleAll(bankName) {
            const listEl = document.getElementById(`list-${bankName}`);
            const cardEl = listEl.closest(".bank-card");
            const fullList = JSON.parse(cardEl.dataset.fullList);
            const btn = cardEl.querySelector(".expand-btn");

            if(listEl.dataset.expanded === "true") {
                // 收合
                listEl.innerHTML = fullList.slice(0,3).map(q => `
                    <div class="qa-item"><div class="question">${q.question}</div><div class="answer">${q.answer}</div></div>
                `).join("");
                listEl.dataset.expanded = "false";
                btn.textContent = `View all ${fullList.length} entries ↓`;
            } else {
                // 展開
                listEl.innerHTML = fullList.map(q => `
                    <div class="qa-item"><div class="question">${q.question}</div><div class="answer">${q.answer}</div></div>
                `).join("");
                listEl.dataset.expanded = "true";
                btn.textContent = `Show less ↑`;
            }
        }

        // ✅ 初始化篩選選項
        function initFilters(data) {
            const catSel = document.getElementById("filterCategory");
            const topicSel = document.getElementById("filterTopic");

            // 分類
            const cats = [...new Set(data.map(d => d.category))].filter(Boolean);
            cats.forEach(c => {const o=new Option(c,c);catSel.appendChild(o);});

            // 主題
            const topics = [...new Set(data.map(d => d.topic))].filter(Boolean);
            topics.forEach(t => {const o=new Option(t,t);topicSel.appendChild(o);});

            // 綁定事件
            document.getElementById("searchMain").addEventListener("input", doFilter);
            document.getElementById("searchKeyword").addEventListener("input", doFilter);
            catSel.addEventListener("change", doFilter);
            topicSel.addEventListener("change", doFilter);
            document.getElementById("filterStatus").addEventListener("change", doFilter);

            window.ALL_QA_DATA = data; // 儲存原始資料
        }

        // ✅ 篩選邏輯（功能完全不變）
        function doFilter() {
            const s1 = document.getElementById("searchMain").value.toLowerCase();
            const s2 = document.getElementById("searchKeyword").value.toLowerCase();
            const cat = document.getElementById("filterCategory").value;
            const topic = document.getElementById("filterTopic").value;
            const status = document.getElementById("filterStatus").value;

            let filtered = window.ALL_QA_DATA;

            if(cat !== "all") filtered = filtered.filter(d => d.category === cat);
            if(topic !== "all") filtered = filtered.filter(d => d.topic === topic);
            if(status !== "all") filtered = filtered.filter(d => d.status === status);

            if(s1) filtered = filtered.filter(d => 
                d.bank.toLowerCase().includes(s1) || 
                d.question.toLowerCase().includes(s1) || 
                d.answer.toLowerCase().includes(s1)
            );
            if(s2) filtered = filtered.filter(d => 
                d.bank.toLowerCase().includes(s2) || 
                d.question.toLowerCase().includes(s2) || 
                d.answer.toLowerCase().includes(s2)
            );

            renderBankCards(filtered);

            // 更新統計
            const uniqueBanks = [...new Set(filtered.map(d => d.bank))].filter(Boolean);
            document.getElementById("statBanks").textContent = `${uniqueBanks.length} Banks`;
            document.getElementById("statQA").textContent = `${filtered.length} Q&A`;
        }
    </script>
</head>
<body>
    <!-- ✅ 頂部導航 -->
    <div class="header-bar">
        <div id="loginDisplay" class="user-info"></div>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>🏦 Bank Q&A Knowledge Base</h1>
            <p>Search, filter and view all bank policies, rules and answers</p>
        </div>

        <!-- ✅ 搜尋+篩選區 -->
        <div class="filter-section">
            <input id="searchMain" type="text" placeholder="Search bank / keyword / question...">
            <select id="filterCategory">
                <option value="all">All Categories</option>
            </select>
            <select id="filterStatus">
                <option value="all">All Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>
        <div class="filter-section filter-row-2">
            <input id="searchKeyword" type="text" placeholder="Search any keyword...">
            <select id="filterTopic">
                <option value="all">All Topics</option>
            </select>
            <select>
                <option>All Types</option>
            </select>
        </div>

        <!-- ✅ 統計資訊 -->
        <div class="stats-bar">
            <div class="stat-item" id="statBanks">0 Banks</div>
            <div class="stat-item" id="statQA">0 Q&A</div>
            <div class="stat-item">Click card to expand details</div>
        </div>

        <!-- ✅ 銀行卡片網格 -->
        <div id="gridArea" class="banks-grid"></div>

        <!-- ✅ 返回按鈕 -->
        <div class="back-link">
            <a href="index.html">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
