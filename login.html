<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="auth.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 12px #0000001a; width: 320px; }
        h2 { text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #165DFF; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #165DFF; text-decoration: none; }
        #msg { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Please Login</h2>
        <input id="acc" type="text" placeholder="Enter Account">
        <input id="pwd" type="password" placeholder="Enter Password">
        <button onclick="doLogin()">Login</button>
        <div id="msg"></div>
        <div class="link">
            <a href="register.html">✍️ Register New Account</a>
        </div>
    </div>

    <script>
        function doLogin() {
            const res = login(acc.value.trim(), pwd.value.trim());
            msg.textContent = res.msg;
            msg.style.color = res.success ? "green" : "red";
            if (res.success) {
                setTimeout(() => {
                    window.location.href = res.isAdmin ? "admin.html" : "index.html";
                }, 1000);
            }
        }
    </script>
</body>
</html>
