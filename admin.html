<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Account Approval</title>
    <script src="auth.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px #00000010; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-green { background: #00B42A; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; margin: 0 4px; cursor: pointer; }
        .btn-red { background: #F53F3F; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; margin: 0 4px; cursor: pointer; }
        .logout { text-align: right; margin-bottom: 10px; }
        .logout a { color: #F53F3F; text-decoration: none; }
    </style>
</head>
<body onload="loadList()">
    <div class="container">
        <div class="logout"><a href="javascript:logout()">🚪 Logout</a></div>

        <div class="card">
            <h3>⏳ Pending Approval</h3>
            <div id="pendingList"></div>
        </div>

        <div class="card">
            <h3>✅ Approved Accounts</h3>
            <div id="approvedList"></div>
        </div>
    </div>

    <script>
        // 進入前先檢查是否為管理員
        checkAdmin();

        function loadList() {
            const pending = JSON.parse(localStorage.getItem("pendingUsers") || "[]");
            const approved = JSON.parse(localStorage.getItem("approvedUsers") || "[]");

            // 渲染待審核
            pendingList.innerHTML = pending.length === 0 ? "<p style='color:#888;'>No pending account</p>" : "";
            pending.forEach((u,i) => {
                const el = document.createElement("div");
                el.className = "item";
                el.innerHTML = `
                    <div>
                        <div>${u.account}</div>
                        <div style="font-size:12px; color:#888;">Reg: ${u.regTime}</div>
                    </div>
                    <div>
                        <button class="btn-green" onclick="approveUser(${i});loadList()">Approve</button>
                        <button class="btn-red" onclick="rejectUser(${i});loadList()">Reject</button>
                    </div>
                `;
                pendingList.appendChild(el);
            });

            // 渲染已通過
            approvedList.innerHTML = approved.length === 0 ? "<p style='color:#888;'>No approved account</p>" : "";
            approved.forEach(u => {
                const el = document.createElement("div");
                el.className = "item";
                el.innerHTML = `
                    <div>
                        <div>${u.account}</div>
                        <div style="font-size:12px; color:#888;">Approved: ${u.approveTime}</div>
                    </div>
                `;
                approvedList.appendChild(el);
            });
        }
    </script>
</body>
</html>
