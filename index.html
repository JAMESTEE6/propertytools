<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    
    <!-- ✅ 登入驗證：自動讀取你的 Google 試算表名單 -->
    <script>
        // 👉 這是你的試算表連結，已經幫你設定好
        const 試算表網址 = "https://docs.google.com/spreadsheets/d/1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg/gviz/tq?tqx=out:csv&sheet=工作表1";
        let 允許名單 = [];

        // 載入試算表名單
        async function 載入名單() {
            try {
                const res = await fetch(試算表網址);
                const text = await res.text();
                const 列 = text.split("\n").slice(1); // 跳過標題列
                允許名單 = 列.map(行 => {
                    const [帳號, 密碼, 姓名, 信箱] = 行.split(",").map(v => v.replace(/"/g, ""));
                    return { 帳號, 密碼 };
                });
                驗證登入(); // 載入完才驗證
            } catch (e) {
                alert("⚠️ 無法載入帳號名單，請稍後再試！");
                window.location.href = "about:blank";
            }
        }

        // 驗證流程
        function 驗證登入() {
            const 輸入帳號 = prompt("🔒 請輸入帳號：");
            const 輸入密碼 = prompt("🔒 請輸入密碼：");

            let 通過 = 允許名單.some(資料 => 資料.帳號 === 輸入帳號 && 資料.密碼 === 輸入密碼);

            if (!通過) {
                alert("❌ 帳號或密碼錯誤，無法進入！");
                window.location.href = "about:blank";
            }
        }

        // 開始執行
        載入名單();
    </script>

    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 加上註冊按鈕樣式 */
        .register-btn {
            display: inline-block;
            margin: 10px 0 20px;
            padding: 8px 16px;
            background: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .register-btn:hover { background: #3367D6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Property Tools 工具箱</h1>
        <p>整理了10+個常用工具，點擊即可使用 👇</p>

        <!-- ✅ 註冊按鈕：連到你的表單 -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf0WmN7HweIn_wNtqhTM8Q_GjgqK_jqH58KvdPn8J845qvMug/viewform?usp=publish-editor" target="_blank" class="register-btn">👉 還沒帳號？點我註冊</a>

        <div class="tool-list">
            <a href="tool1.html" class="tool-card">
                <h3>Booking Form Generator</h3>
                <p>Fill in details and print out</p>
            </a>
            <a href="tool2.html" class="tool-card">
                <h3>工具2：時間日期</h3>
                <p>時間戳轉換、日期計算、倒數計時</p>
            </a>
            <a href="tool3.html" class="tool-card">
                <h3>工具3：編碼解碼</h3>
                <p>URL / Base64 / Unicode 互轉</p>
            </a>
            <a href="tool4.html" class="tool-card">
                <h3>工具4：加密解密</h3>
                <p>MD5 / SHA1 生成、基礎加密/解</p>
            </a>
            <a href="tool5.html" class="tool-card">
                <h3>tool5</h3>
            </a>
        </div>
    </div>
</body>
</html>
