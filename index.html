<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        /* 登入框：置中、最上層 */
        .login-box {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 99999;
            width: 320px;
            text-align: center;
        }
        .login-box h3 {
            margin: 0 0 20px;
            color: #333;
            font-size: 18px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover { background: #1d4ed8; }
        .register-link {
            display: inline-block; margin-top: 15px;
            font-size: 14px; color: #2563eb;
            text-decoration: none;
        }
        .register-link:hover { text-decoration: underline; }
        /* 背景半透明 */
        .mask {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99998;
        }
        /* 內容預設隱藏 */
        .content { display: none; padding: 20px; }
    </style>

    <script>
        // ========== 已修正：工作表名稱改為正確的「Form_Responses」 ==========
        const 試算表ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        const 工作表名 = "Form_Responses"; 
        // ==================================================================

        let 帳密名單 = [];

        // 載入試算表
        window.onload = function() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(工作表名)}`;
            window.gvizCallback = function(json) {
                try {
                    const 列 = json.table.rows;
                    // 對應欄位：B欄=ACCOUNT、C欄=PASSWORD，自動去除空白
                    帳密名單 = 列.slice(1).map(r => ({
                        帳號: (r.c[1]?.v || "").trim(),
                        密碼: (r.c[2]?.v || "").trim()
                    }));
                    console.log("✅ 載入成功，有效帳號：", 帳密名單.map(i => i.帳號));
                } catch (e) {
                    alert("❌ 讀取帳號失敗：" + e.message);
                }
            };
            document.head.appendChild(s);
        };

        // 驗證登入
        function 執行登入() {
            const 輸帳號 = document.getElementById("acc").value.trim();
            const 輸密碼 = document.getElementById("pwd").value.trim();

            const 正確 = 帳密名單.some(資料 => 資料.帳號 === 輸帳號 && 資料.密碼 === 輸密碼);

            if (正確) {
                document.querySelector(".mask").style.display = "none";
                document.querySelector(".login-box").style.display = "none";
                document.querySelector(".content").style.display = "block";
            } else {
                alert("❌ 帳號或密碼錯誤，請重新輸入！");
            }
        }

        // 按Enter快速登入
        function 按鍵(e) {
            if (e.key === "Enter") 執行登入();
        }
    </script>
</head>
<body>

    <!-- 半透明背景 -->
    <div class="mask"></div>

    <!-- 登入框 -->
    <div class="login-box">
        <h3>🔒 請先登入</h3>
        <input type="text" id="acc" placeholder="輸入帳號" onkeydown="按鍵(event)">
        <input type="password" id="pwd" placeholder="輸入密碼" onkeydown="按鍵(event)">
        <button onclick="執行登入()">確認登入</button>
        <br>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf0WmN7HweIn_wNtqhTM8Q_GjgqK_jqH58KvdPn8J845qvMug/viewform?usp=publish-editor" target="_blank" class="register-link">👉 還沒有帳號？點我註冊</a>
    </div>

    <!-- 你的原本內容，全部包在這裡，完全不用改 -->
    <div class="content">
        <div class="container">
            <h1>🏠 Property Tools 工具箱</h1>
            <p>整理了10+個常用工具，點擊即可使用 👇</p>

            <div class="tool-list">
                <a href="tool1.html" class="tool-card">
                    <h3>Booking Form Generator</h3>
                    <p>Fill in details and print out</p>
                </a>
                <a href="tool2.html" class="tool-card">
                    <h3>工具2：時間日期</h3>
                    <p>時間戳轉換、日期計算、倒數計時</p>
                </a>
                <a href="tool3.html" class="tool-card">
                    <h3>工具3：編碼解碼</h3>
                    <p>URL / Base64 / Unicode 互轉</p>
                </a>
                <a href="tool4.html" class="tool-card">
                    <h3>工具4：加密解密</h3>
                    <p>MD5 / SHA1 生成、基礎加密/解</p>
                </a>
                <a href="tool5.html" class="tool-card">
                    <h3>tool5</h3>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
