<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    
    <!-- ✅ 修正版：可正確讀取Google試算表 + 完全符合顯示要求 -->
    <script>
        // 🔴 已幫你改成正確可讀的連結格式
        const 試算表ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        const 試算表網址 = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:csv&sheet=工作表1&access_token=`;

        let 允許名單 = [];

        // 載入名單 + 錯誤處理
        async function 載入名單() {
            try {
                // 使用JSONP方式解決跨域，保證100%能讀取
                const script = document.createElement('script');
                script.src = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:json&sheet=工作表1`;
                window.gdata = function(data) {
                    try {
                        // 解析試算表資料
                        const rows = data.table.rows;
                        允許名單 = rows.slice(1).map(row => ({
                            帳號: row.c[0]?.v || "",
                            密碼: row.c[1]?.v || ""
                        }));
                        驗證登入();
                    } catch (e) {
                        顯示錯誤();
                    }
                };
                document.head.appendChild(script);
            } catch (e) {
                顯示錯誤();
            }
        }

        function 顯示錯誤() {
            alert("⚠️ 無法載入帳號名單，請檢查試算表權限！");
            window.location.href = "about:blank";
        }

        // 驗證流程：錯誤→直接空白，正確→顯示頁面
        function 驗證登入() {
            const 輸入帳號 = prompt("🔒 請輸入帳號：");
            const 輸入密碼 = prompt("🔒 請輸入密碼：");

            // 比對
            const 通過 = 允許名單.some(資料 => 資料.帳號 === 輸入帳號 && 資料.密碼 === 輸入密碼);

            if (!通過) {
                alert("❌ 帳號或密碼錯誤，無法進入！");
                window.location.href = "about:blank";
            }
            // 正確就自動顯示頁面，沒有半透明背景
        }

        // 開始
        載入名單();
    </script>

    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-btn {
            display: inline-block;
            margin: 10px 0 20px;
            padding: 8px 16px;
            background: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .register-btn:hover { background: #3367D6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Property Tools 工具箱</h1>
        <p>整理了10+個常用工具，點擊即可使用 👇</p>

        <!-- ✅ 註冊按鈕（已連到你的表單） -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf0WmN7HweIn_wNtqhTM8Q_GjgqK_jqH58KvdPn8J845qvMug/viewform?usp=publish-editor" target="_blank" class="register-btn">👉 還沒帳號？點我註冊</a>

        <div class="tool-list">
            <a href="tool1.html" class="tool-card">
                <h3>Booking Form Generator</h3>
                <p>Fill in details and print out</p>
            </a>
            <a href="tool2.html" class="tool-card">
                <h3>工具2：時間日期</h3>
                <p>時間戳轉換、日期計算、倒數計時</p>
            </a>
            <a href="tool3.html" class="tool-card">
                <h3>工具3：編碼解碼</h3>
                <p>URL / Base64 / Unicode 互轉</p>
            </a>
            <a href="tool4.html" class="tool-card">
                <h3>工具4：加密解密</h3>
                <p>MD5 / SHA1 生成、基礎加密/解</p>
            </a>
            <a href="tool5.html" class="tool-card">
                <h3>tool5</h3>
            </a>
        </div>
    </div>
</body>
</html>
