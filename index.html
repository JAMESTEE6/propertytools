<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .login-box {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff; padding: 35px;
            border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 99999; width: 320px; text-align: center;
        }
        .login-box h3 { margin: 0 0 20px; color: #333; font-size: 18px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; margin-top: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .login-box button:hover { background: #1d4ed8; }
        .register-link { display: inline-block; margin-top: 15px; font-size: 14px; color: #2563eb; text-decoration: none; }
        .register-link:hover { text-decoration: underline; }
        .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99998; }
        .content { display: none; padding: 20px; }
    </style>

    <script>
        // ✅ 正確設定：對應你的表單回應試算表
        // 從你的連結取出表單ID，對應的試算表就是你看到的「工作表 1」→ 自動產生的工作表名稱是「Form Responses 1」
        const 試算表ID = "1mqPA5Eakr6naCI3DmFeb05dVm83cDYfrfRhCki9RbeE";
        const 工作表名 = "Form Responses 1"; // Google 表單預設的回應工作表名稱
        let 帳密名單 = [];

        // ✅ 固定抓：第2欄=ACCOUNT、第3欄=PASSWORD（完全對應你的表單欄位順序）
        window.處理試算表資料 = function(json) {
            try {
                const 所有列 = json.table.rows;
                // 跳過第一列（時間戳），從第二列開始：第2欄=帳號、第3欄=密碼
                帳密名單 = 所有列.slice(1).map(列 => ({
                    帳號: (列.c[1]?.v || "").trim(), // ACCOUNT
                    密碼: (列.c[2]?.v || "").trim()  // PASSWORD
                })).filter(i => i.帳號);

                console.log("✅ 載入成功！所有帳密：", 帳密名單);
                console.log("✅ 測試 jacey/jacey123：", 帳密名單.some(i => i.帳號 === "jacey" && i.密碼 === "jacey123") ? "✅ 存在" : "❌ 不存在");

            } catch (e) {
                alert("❌ 讀取失敗！請確認：1. 試算表已開「任何人有連結 → 檢視者」 2. 工作表名稱是「Form Responses 1」");
            }
        };

        // 載入資料
        window.onload = function() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(工作表名)}&callback=處理試算表資料`;
            document.head.appendChild(s);
        };

        // 登入驗證
        function 執行登入() {
            const 輸帳號 = document.getElementById("acc").value.trim();
            const 輸密碼 = document.getElementById("pwd").value.trim();
            const 正確 = 帳密名單.some(d => d.帳號 === 輸帳號 && d.密碼 === 輸密碼);
            if (正確) {
                document.querySelector(".mask").style.display = "none";
                document.querySelector(".login-box").style.display = "none";
                document.querySelector(".content").style.display = "block";
            } else {
                alert("❌ 帳號或密碼錯誤！");
            }
        }
        function 按鍵(e) { if (e.key === "Enter") 執行登入(); }
    </script>
</head>
<body>
    <div class="mask"></div>
    <div class="login-box">
        <h3>🔒 請先登入</h3>
        <input type="text" id="acc" placeholder="輸入帳號" onkeydown="按鍵(event)">
        <input type="password" id="pwd" placeholder="輸入密碼" onkeydown="按鍵(event)">
        <button onclick="執行登入()">確認登入</button>
        <br>
        <a href="https://docs.google.com/forms/d/1mqPA5Eakr6naCI3DmFeb05dVm83cDYfrfRhCki9RbeE/viewform?usp=sf_link" target="_blank" class="register-link">👉 還沒有帳號？點我註冊</a>
    </div>

    <div class="content">
        <div class="container">
            <h1>🏠 Property Tools 工具箱</h1>
            <p>整理了10+個常用工具，點擊即可使用 👇</p>
            <div class="tool-list">
                <a href="tool1.html" class="tool-card"><h3>Booking Form Generator</h3><p>Fill in details and print out</p></a>
                <a href="tool2.html" class="tool-card"><h3>工具2：時間日期</h3><p>時間戳轉換、日期計算、倒數計時</p></a>
                <a href="tool3.html" class="tool-card"><h3>工具3：編碼解碼</h3><p>URL / Base64 / Unicode 互轉</p></a>
                <a href="tool4.html" class="tool-card"><h3>工具4：加密解密</h3><p>MD5 / SHA1 生成、基礎加密/解</p></a>
                <a href="tool5.html" class="tool-card"><h3>tool5</h3></a>
            </div>
        </div>
    </div>
</body>
</html>
