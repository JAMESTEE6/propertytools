<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    
    <!-- ✅ 登入驗證：一定要放在最前面，meta 之後、其他任何標籤之前 -->
    <script>
        // 你可以自己增加/修改帳號密碼
        const 允許名單 = [
          {帳號: "admin", 密碼: "123456"},
          {帳號: "user01", 密碼: "abc123"},
          {帳號: "team", 密碼: "prop2026"}
        ];

        // 跳出輸入框
        const 輸入帳號 = prompt("🔒 請輸入帳號：");
        const 輸入密碼 = prompt("🔒 請輸入密碼：");

        // 比對驗證
        let 通過 = false;
        for (let 資料 of 允許名單) {
          if (資料.帳號 === 輸入帳號 && 資料.密碼 === 輸入密碼) {
            通過 = true;
            break;
          }
        }

        // 驗證失敗 → 清空整個頁面
        if (!通過) {
          alert("❌ 帳號或密碼錯誤，無法進入！");
          document.documentElement.innerHTML = "";
        }
    </script>

    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏠 Property Tools 工具箱</h1>
        <p>整理了10+個常用工具，點擊即可使用 👇</p>

        <div class="tool-list">
            <a href="tool1.html" class="tool-card">
                <h3>Booking Form Generator</h3>
                <p>Fill in details and print out</p>
            </a>
            <a href="tool2.html" class="tool-card">
                <h3>工具2：時間日期</h3>
                <p>時間戳轉換、日期計算、倒數計時</p>
            </a>
            <a href="tool3.html" class="tool-card">
                <h3>工具3：編碼解碼</h3>
                <p>URL / Base64 / Unicode 互轉</p>
            </a>
            <a href="tool4.html" class="tool-card">
                <h3>工具4：加密解密</h3>
                <p>MD5 / SHA1 生成、基礎加密/解</p>
            </a>
            <a href="tool5.html" class="tool-card">
                <h3>tool5</h3>
            </a>
        </div>
    </div>
</body>
</html>
