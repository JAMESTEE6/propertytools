<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register New Account</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { background: #fff; padding: 35px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 320px; }
        h3 { text-align: center; margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #10b981; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #059669; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #2563eb; text-decoration: none; }
        .msg { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
    <script>
        const 試算表ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        const REG_ENDPOINT = "https://script.google.com/macros/s/AKfycbw5QH0f6FzHnXqYgE7rBkMZ4eD9R0sTfG3hY2xZ/exec";

        function getMYTime() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }

        async function doRegister() {
            const acc = document.getElementById("acc").value.trim();
            const pwd = document.getElementById("pwd").value.trim();
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const msg = document.getElementById("msg");

            if(!acc || !pwd || !name) return msg.textContent = "❌ 帳號、密碼、姓名不可空白";
            if(pwd !== document.getElementById("pwd2").value.trim()) return msg.textContent = "❌ 密碼不一致";

            try {
                await fetch(REG_ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "register",
                        time: getMYTime(),
                        account: acc,
                        password: pwd,
                        name: name,
                        email: email,
                        status: "pending"
                    }),
                    redirect: "follow"
                });
                msg.textContent = "✅ 註冊成功！請等待管理員審核";
                msg.style.color = "green";
                setTimeout(() => window.location.href = "index.html", 2000);
            } catch (e) {
                msg.textContent = "❌ 註冊失敗，請稍後再試";
                msg.style.color = "red";
            }
        }
    </script>
</head>
<body>
    <div class="box">
        <h3>✍️ Register New Account</h3>
        <input id="acc" type="text" placeholder="Account *">
        <input id="pwd" type="password" placeholder="Password *">
        <input id="pwd2" type="password" placeholder="Confirm Password *">
        <input id="name" type="text" placeholder="Full Name *">
        <input id="email" type="email" placeholder="Email Address">
        <button onclick="doRegister()">Submit Register</button>
        <div id="msg" class="msg"></div>
        <div class="link"><a href="index.html">← Back to Login</a></div>
    </div>
</body>
</html>
