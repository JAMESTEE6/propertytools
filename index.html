<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        /* 登入框：置中、最上層 */
        .login-box {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 99999;
            width: 320px;
            text-align: center;
        }
        .login-box h3 {
            margin: 0 0 20px;
            color: #333;
            font-size: 18px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover { background: #1d4ed8; }
        .register-link {
            display: inline-block; margin-top: 15px;
            font-size: 14px; color: #2563eb;
            text-decoration: none;
        }
        .register-link:hover { text-decoration: underline; }
        /* 背景半透明 */
        .mask {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99998;
        }
        /* 內容預設隱藏 */
        .content { display: none; padding: 20px; }
    </style>

    <script>
        // ✅ 設定區
        const 試算表ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        const 工作表名 = "Form_Responses";
        let 帳密名單 = [];

        // ✅ 最終解法：直接抓取原始字串，手動解析，完全避開所有錯誤
        window.onload = function() {
            const script = document.createElement('script');
            // 強制回傳純文字格式，不執行任何函式
            script.src = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(工作表名)}`;
            // 攔截回傳內容，不讓它執行
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'gviz-response') {
                    try {
                        // 手動取出 JSON 字串
                        const raw = e.data.response;
                        const jsonText = raw.substring(raw.indexOf('{'), raw.lastIndexOf('}')+1);
                        const json = JSON.parse(jsonText);

                        const 所有列 = json.table.rows;
                        const 標題列 = 所有列[0].c.map(c => c.v.trim().toUpperCase());
                        const 帳號欄 = 標題列.indexOf("ACCOUNT");
                        const 密碼欄 = 標題列.indexOf("PASSWORD");

                        if (帳號欄 === -1 || 密碼欄 === -1) {
                            alert("❌ 找不到 ACCOUNT / PASSWORD 欄位");
                            return;
                        }

                        // 整理帳密清單
                        帳密名單 = 所有列.slice(1).map(列 => ({
                            帳號: (列.c[帳號欄]?.v || "").trim(),
                            密碼: (列.c[密碼欄]?.v || "").trim()
                        })).filter(i => i.帳號);

                        console.log("✅ 成功載入：", 帳密名單);
                        console.log("✅ jacey/jacey123 狀態：", 帳密名單.some(i => i.帳號==="jacey"&&i.密碼==="jacey123") ? "✅ 存在" : "❌ 不存在");

                    } catch (err) {
                        alert("❌ 解析失敗：" + err.message + "，請確認試算表權限「任何人有連結 → 檢視者」");
                    }
                }
            });
            // 用 iframe 偷偷抓內容，完全跨域安全
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(工作表名)}&callback=parent.postMessage({type:'gviz-response',response:JSON.stringify(gvizResponse)},'*')`;
            document.body.appendChild(iframe);
        };

        // 驗證登入
        function 執行登入() {
            const 輸帳號 = document.getElementById("acc").value.trim();
            const 輸密碼 = document.getElementById("pwd").value.trim();

            const 正確 = 帳密名單.some(資料 => 資料.帳號 === 輸帳號 && 資料.密碼 === 輸密碼);

            if (正確) {
                document.querySelector(".mask").style.display = "none";
                document.querySelector(".login-box").style.display = "none";
                document.querySelector(".content").style.display = "block";
            } else {
                alert("❌ 帳號或密碼錯誤，請重新輸入！");
            }
        }

        // 按Enter快速登入
        function 按鍵(e) {
            if (e.key === "Enter") 執行登入();
        }
    </script>
</head>
<body>

    <!-- 半透明背景 -->
    <div class="mask"></div>

    <!-- 登入框 -->
    <div class="login-box">
        <h3>🔒 請先登入</h3>
        <input type="text" id="acc" placeholder="輸入帳號" onkeydown="按鍵(event)">
        <input type="password" id="pwd" placeholder="輸入密碼" onkeydown="按鍵(event)">
        <button onclick="執行登入()">確認登入</button>
        <br>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf0WmN7HweIn_wNtqhTM8Q_GjgqK_jqH58KvdPn8J845qvMug/viewform?usp=publish-editor" target="_blank" class="register-link">👉 還沒有帳號？點我註冊</a>
    </div>

    <!-- 頁面內容（成功才顯示） -->
    <div class="content">
        <div class="container">
            <h1>🏠 Property Tools 工具箱</h1>
            <p>整理了10+個常用工具，點擊即可使用 👇</p>

            <div class="tool-list">
                <a href="tool1.html" class="tool-card">
                    <h3>Booking Form Generator</h3>
                    <p>Fill in details and print out</p>
                </a>
                <a href="tool2.html" class="tool-card">
                    <h3>工具2：時間日期</h3>
                    <p>時間戳轉換、日期計算、倒數計時</p>
                </a>
                <a href="tool3.html" class="tool-card">
                    <h3>工具3：編碼解碼</h3>
                    <p>URL / Base64 / Unicode 互轉</p>
                </a>
                <a href="tool4.html" class="tool-card">
                    <h3>工具4：加密解密</h3>
                    <p>MD5 / SHA1 生成、基礎加密/解</p>
                </a>
                <a href="tool5.html" class="tool-card">
                    <h3>tool5</h3>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
