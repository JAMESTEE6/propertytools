<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    
    <!-- ✅ 最終版：先驗證，正確才顯示頁面，完全不先顯示內容 -->
    <script>
        // 試算表設定
        const 試算表ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        let 允許名單 = [];
        let 頁面已準備 = false;

        // 第一步：先載入名單
        async function 載入名單() {
            try {
                const script = document.createElement('script');
                script.src = `https://docs.google.com/spreadsheets/d/${試算表ID}/gviz/tq?tqx=out:json&sheet=工作表1`;
                window.gdata = function(data) {
                    // 解析：只抓 帳號(第1欄)、密碼(第2欄)
                    允許名單 = data.table.rows.slice(1).map(row => ({
                        帳號: row.c[0]?.v?.trim() || "",
                        密碼: row.c[1]?.v?.trim() || ""
                    }));
                    頁面已準備 = true;
                    執行登入驗證(); // 載好才跳出輸入框
                };
                document.head.appendChild(script);
            } catch (e) {
                alert("⚠️ 系統維護中，請稍後再試！");
                document.documentElement.innerHTML = "";
            }
        }

        // 第二步：驗證
        function 執行登入驗證() {
            const 輸入帳號 = prompt("🔒 請輸入帳號：");
            const 輸入密碼 = prompt("🔒 請輸入密碼：");

            // 比對
            const 驗證通過 = 允許名單.some(資料 => 
                資料.帳號 === 輸入帳號 && 資料.密碼 === 輸入密碼
            );

            if (!驗證通過) {
                alert("❌ 帳號或密碼錯誤，無法進入！");
                document.documentElement.innerHTML = ""; // 直接清空，什麼都看不到
                return;
            }

            // ✅ 正確：才顯示頁面內容
            document.body.style.display = "block";
        }

        // 預先隱藏整個頁面，等驗證通過才顯示
        document.write('<style>body{display:none;}</style>');

        // 開始
        載入名單();
    </script>

    <title>Property Tools - 實用工具集合</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-btn {
            display: inline-block;
            margin: 10px 0 20px;
            padding: 8px 16px;
            background: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .register-btn:hover { background: #3367D6; }
    </style>
</head>
<body> <!-- 一開始是隱藏的！ -->
    <div class="container">
        <h1>🏠 Property Tools 工具箱</h1>
        <p>整理了10+個常用工具，點擊即可使用 👇</p>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf0WmN7HweIn_wNtqhTM8Q_GjgqK_jqH58KvdPn8J845qvMug/viewform?usp=publish-editor" target="_blank" class="register-btn">👉 還沒帳號？點我註冊</a>

        <div class="tool-list">
            <a href="tool1.html" class="tool-card">
                <h3>Booking Form Generator</h3>
                <p>Fill in details and print out</p>
            </a>
            <a href="tool2.html" class="tool-card">
                <h3>工具2：時間日期</h3>
                <p>時間戳轉換、日期計算、倒數計時</p>
            </a>
            <a href="tool3.html" class="tool-card">
                <h3>工具3：編碼解碼</h3>
                <p>URL / Base64 / Unicode 互轉</p>
            </a>
            <a href="tool4.html" class="tool-card">
                <h3>工具4：加密解密</h3>
                <p>MD5 / SHA1 生成、基礎加密/解</p>
            </a>
            <a href="tool5.html" class="tool-card">
                <h3>tool5</h3>
            </a>
        </div>
    </div>
</body>
</html>
