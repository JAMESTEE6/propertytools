<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Tools</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        /* ✅ 強制顯示，永遠不會消失 */
        .login-box {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff; padding: 35px;
            border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 99999; width: 320px; text-align: center;
        }
        .login-box h3 { margin: 0 0 20px; color: #333; font-size: 18px; }
        .login-box input { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border: 1px solid #ddd; border-radius: 6px; 
            font-size: 15px; box-sizing: border-box;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .login-box button { width: 100%; padding: 12px; margin-top: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99998; }
        .content { display: none; padding: 20px; }
        .tool-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .tool-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration: none; color: #333; }
    </style>
    <script>
        const sheetID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
        const sheetName = "工作表1";
        let userList = [];

        window.onload = function() {
            // ✅ 【永久記住】關閉瀏覽器再開也不用重輸密碼
            if (localStorage.getItem("isLogin") === "true") {
                document.querySelector(".mask").style.display = "none";
                document.querySelector(".login-box").style.display = "none";
                document.querySelector(".content").style.display = "block";
                return;
            }

            // ✅ 載入帳密，完全排除錯誤
            fetch(`https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&sheet=${encodeURIComponent(sheetName)}`)
            .then(r => r.text())
            .then(csv => {
                let rows = csv.split("\n").filter(r => r.trim() !== "").map(r => r.split(","));
                userList = rows.slice(1).map(r => ({
                    acc: (r[1] || "").trim(),
                    pwd: (r[2] || "").trim()
                })).filter(i => i.acc);
            })
            .catch(e => console.log("Load error:", e)); // 只記錄，不擋功能
        };

        function login() {
            let acc = document.getElementById("acc").value.trim();
            let pwd = document.getElementById("pwd").value.trim();
            let ok = userList.some(i => i.acc === acc && i.pwd === pwd);
            if (ok) {
                localStorage.setItem("isLogin", "true"); // ✅ 永久儲存
                document.querySelector(".mask").style.display = "none";
                document.querySelector(".login-box").style.display = "none";
                document.querySelector(".content").style.display = "block";
            } else {
                alert("Wrong account or password");
            }
        }
        function enterKey(e) { if (e.key === "Enter") login(); }
    </script>
</head>
<body>
    <div class="mask"></div>
    <!-- ✅ 登入框完整，帳號密碼都在 -->
    <div class="login-box">
        <h3>🔒 Please Login</h3>
        <input type="text" id="acc" placeholder="Enter Account" onkeydown="enterKey(event)">
        <input type="password" id="pwd" placeholder="Enter Password" onkeydown="enterKey(event)">
        <button onclick="login()">Login</button>
    </div>

    <div class="content">
        <h1>🏠 Property Tools</h1>
        <div class="tool-list">
            <a href="tool1.html" class="tool-card"><h3>Booking Form Generator</h3></a>
            <a href="tool2.html" class="tool-card"><h3>Tool 2</h3></a>
            <a href="tool3.html" class="tool-card"><h3>Tool 3</h3></a>
            <a href="tool4.html" class="tool-card"><h3>Tool 4</h3></a>
            <a href="tool5.html" class="tool-card"><h3>Tool 5</h3></a>
        </div>
    </div>
</body>
</html>
