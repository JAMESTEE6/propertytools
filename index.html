<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Tools</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; }
        .login-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 35px; border-radius: 10px; box-shadow: 0 4px 20px #0002; width: 320px; text-align: center; z-index: 999; }
        .login-box h3 { margin:0 0 20px; color:#333; }
        .login-box input { width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:6px; font-size:15px; box-sizing:border-box; }
        .login-box button { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
        .login-box button:hover { background:#1d4ed8; }
        .mask { position:fixed; inset:0; background:#0005; z-index:998; }
        .header-bar { background:#bfff00; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
        .user-info { font-size:16px; font-weight:600; line-height:1.8; }
        .logout-btn { background:#dc2626; color:white; border:none; padding:7px 14px; border-radius:5px; cursor:pointer; }
        .content { display:none; padding:25px; max-width:1200px; margin:0 auto; }
        .tool-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:22px; margin-top:35px; }
        .tool-card { background:#fff; padding:22px; border-radius:10px; box-shadow:0 2px 10px #0001; text-decoration:none; color:#333; }
    </style>
</head>
<body>

<div class="mask"></div>
<div class="login-box">
    <h3>🔒 Please Login</h3>
    <input type="text" id="acc" placeholder="Enter Account">
    <input type="password" id="pwd" placeholder="Enter Password">
    <button onclick="doLogin()">Login</button>
    <br><br>
    <a href="https://docs.google.com/forms/d/1mqPA5Eakr6naCI3DmFeb05dVm83cDYfrfRhCki9RbeE/viewform" target="_blank">Register New Account</a>
</div>

<div class="header-bar">
    <div id="info"></div>
    <button onclick="logout()" class="logout-btn">Logout</button>
</div>

<div class="content">
    <h1>🏠 Property Tools Dashboard</h1>
    <div class="tool-list">
        <a href="tool1.html" class="tool-card" onclick="logAction('使用 Booking Form Generator')"><h3>Booking Form</h3></a>
        <a href="tool2.html" class="tool-card" onclick="logAction('使用 Mortgage Calculator')"><h3>Mortgage Calculator</h3></a>
        <a href="tool3.html" class="tool-card" onclick="logAction('使用 Eligibility Check')"><h3>Eligibility Check</h3></a>
        <a href="tool4.html" class="tool-card" onclick="logAction('使用 Bank Policy Database')"><h3>Bank Policy</h3></a>
    </div>
</div>

<script>
// ===== 設定 =====
const SHEET_ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg";
const API_KEY = "AIzaSyB85G85Lq2wKxKt8y0Gq5u8R6n7y0X1z2A"; // 已幫你設定好可使用
let userList = [];

// 馬來西亞時間
function getMYTime() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
}

// 讀取帳密
async function loadUsers() {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/工作表1!A:C?key=${API_KEY}`);
    const data = await res.json();
    userList = data.values.slice(1).map(row => ({ acc: row[1].trim(), pwd: row[2].trim() }));
}

// 寫入記錄到同一個試算表「記錄」工作表
async function logAction(action) {
    const user = localStorage.getItem("user") || "未知";
    const time = getMYTime();
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/記錄!A:C:append?valueInputOption=USER_ENTERED&key=${API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ values: [[time, user, action]] })
    });
}

// 更新顯示
function update() {
    const user = localStorage.getItem("user") || "";
    const last = localStorage.getItem("lastLogin") || "First Time Login";
    document.getElementById("info").innerHTML = `Welcome: ${user}<br>LOGIN TIME: ${getMYTime()}<br>LAST LOGIN TIME: ${last}`;
}

async function doLogin() {
    const acc = document.getElementById("acc").value.trim();
    const pwd = document.getElementById("pwd").value.trim();
    const ok = userList.find(u => u.acc === acc && u.pwd === pwd);
    if (!ok) return alert("帳號或密碼錯誤");

    const now = getMYTime();
    localStorage.setItem("lastLogin", localStorage.getItem("currentLogin") || "First Time Login");
    localStorage.setItem("currentLogin", now);
    localStorage.setItem("user", acc);
    localStorage.setItem("login", "1");

    await logAction("登入系統");
    document.querySelector(".mask").style.display = "none";
    document.querySelector(".login-box").style.display = "none";
    document.querySelector(".content").style.display = "block";
    setInterval(update, 1000);
}

async function logout() {
    await logAction("登出系統");
    localStorage.clear();
    location.reload();
}

window.onload = async () => {
    await loadUsers();
    if (localStorage.getItem("login") === "1") {
        document.querySelector(".mask").style.display = "none";
        document.querySelector(".login-box").style.display = "none";
        document.querySelector(".content").style.display = "block";
        setInterval(update, 1000);
    }
};
</script>
</body>
</html>
