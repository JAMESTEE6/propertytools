<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Policy Database</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;}
        body {background-color: #f8f9fa; line-height: 1.65;}

        /* ✅ 頂部風格 和之前一致 */
        .top-section {background-color: #bfff00; padding: 28px 24px 40px; margin-bottom: 30px;}
        .back-btn {background-color: #0a2463; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 32px; box-shadow: 0 2px 6px rgba(0,0,0,0.12);}
        .page-title {text-align: center; color: #000;}
        .page-title h1 {font-size: 22px; font-weight: 700; margin-bottom: 6px;}
        .page-title p {font-size: 14px; opacity: 0.8;}

        .container {max-width: 1000px; margin: 0 auto; padding: 0 24px;}

        /* ✅ 卡片 一致樣式 */
        .card {background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); border: 1px solid #eaecef; padding: 30px; margin-bottom: 30px;}
        .card-header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee;}
        .card-title {font-size: 18px; font-weight: 700; color: #2d3748; margin: 0;}

        /* ✅ 篩選下拉 一致樣式 */
        #bankFilter {padding: 6px 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; color: #2d3748; background-color: #fafbfc;}
        #bankFilter:focus {outline: none; border-color: #0a2463; box-shadow: 0 0 0 2px rgba(10, 36, 99, 0.1);}

        .alert {padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: none;}
        .alert-success {background-color: #f0fff4; border: 1px solid #9ae6b4; color: #22543d;}
        .alert-error {background-color: #fff5f5; border: 1px solid #feb2b2; color: #742a2a;}

        /* ✅ 列表 一致樣式 + 銀行顏色 */
        .policy-list {margin-top: 20px;}
        .policy-item {padding: 18px; background-color: #f7fafc; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid; transition: all 0.2s;}
        .policy-item:hover {background-color: #edf2f7;}

        /* ✅ 21家銀行顏色 完全沿用 */
        .color-cimb       {border-color: #002b5c;}
        .color-public     {border-color: #004a99;}
        .color-rhb        {border-color: #e21b23;}
        .color-hlb        {border-color: #007a3d;}
        .color-alliance   {border-color: #0073ce;}
        .color-ambank     {border-color: #004a99;}
        .color-affin      {border-color: #004b93;}
        .color-islam      {border-color: #009640;}
        .color-rakyat     {border-color: #d31145;}
        .color-maybank    {border-color: #006747;}
        .color-muamalat   {border-color: #006747;}
        .color-mbsb       {border-color: #004795;}
        .color-bsn        {border-color: #003b7e;}
        .color-agro       {border-color: #002f6c;}
        .color-hsbc       {border-color: #db0011;}
        .color-boc        {border-color: #a30013;}
        .color-scb        {border-color: #00338d;}
        .color-alrajhi    {border-color: #006039;}
        .color-uob        {border-color: #003d88;}
        .color-ocbc       {border-color: #ed1c24;}

        /* ✅ 政策內容排版：上下分行、整齊對齊 */
        .policy-row {margin: 4px 0; font-size: 14px;}
        .policy-label {font-weight: 600; color: #333; display: inline-block; min-width: 220px;}
        .policy-value {color: #926600;}
    </style>
</head>
<body>
    <div class="top-section">
        <a href="index.html" class="back-btn">← Back to Main Menu</a>
        <div class="page-title">
            <h1>Bank Policy Database</h1>
            <p>Policy Guidelines & Requirements | View Only</p>
        </div>
    </div>

    <div class="container">
        <div id="alertError" class="alert alert-error">❌ <span id="errorMsg"></span></div>

        <!-- ✅ 政策列表 + 銀行篩選 -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">📋 Policy List (From Sheet1)</h3>
                <select id="bankFilter" onchange="filterPolicies()">
                    <option value="">All Banks</option>
                    <option value="CIMB">CIMB</option>
                    <option value="Public Bank">Public Bank</option>
                    <option value="RHB">RHB</option>
                    <option value="Hong Leong Bank">Hong Leong Bank</option>
                    <option value="Alliance Bank">Alliance Bank</option>
                    <option value="AmBank">AmBank</option>
                    <option value="Affin Bank">Affin Bank</option>
                    <option value="Bank Islam">Bank Islam</option>
                    <option value="Bank Rakyat">Bank Rakyat</option>
                    <option value="Maybank">Maybank</option>
                    <option value="Bank Muamalat">Bank Muamalat</option>
                    <option value="MBSB Bank">MBSB Bank</option>
                    <option value="BSN">BSN</option>
                    <option value="Agro Bank">Agro Bank</option>
                    <option value="HSBC">HSBC</option>
                    <option value="Bank of China">Bank of China</option>
                    <option value="Standard Chartered">Standard Chartered</option>
                    <option value="Al Rajhi Bank">Al Rajhi Bank</option>
                    <option value="UOB">UOB</option>
                    <option value="OCBC">OCBC</option>
                </select>
            </div>
            <div id="loading" class="text-center py-10 text-gray-500">Loading latest policies...</div>
            <div id="policyList" class="policy-list"></div>
        </div>
    </div>

    <script>
        // ===================== ✅ 已全部設定完成，直接可用 =====================
        const SHEET_ID = "1tJsY1dX4P2Wsg6EFmHVkbtDUvPwE0EU8jafFHblFLmg"; 
        const SHEET_URL_READ = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=工作表1&gid=1342176650`;

        const bankColorMap = {
            "CIMB": "color-cimb",
            "Public Bank": "color-public",
            "RHB": "color-rhb",
            "Hong Leong Bank": "color-hlb",
            "Alliance Bank": "color-alliance",
            "AmBank": "color-ambank",
            "Affin Bank": "color-affin",
            "Bank Islam": "color-islam",
            "Bank Rakyat": "color-rakyat",
            "Maybank": "color-maybank",
            "Bank Muamalat": "color-muamalat",
            "MBSB Bank": "color-mbsb",
            "BSN": "color-bsn",
            "Agro Bank": "color-agro",
            "HSBC": "color-hsbc",
            "Bank of China": "color-boc",
            "Standard Chartered": "color-scb",
            "Al Rajhi Bank": "color-alrajhi",
            "UOB": "color-uob",
            "OCBC": "color-ocbc"
        };

        let allData = [];

        // ===================== 功能區：讀取 + 篩選 + 渲染 =====================
        window.onload = loadData;

        // 讀取政策試算表
        function loadData() {
            fetch(SHEET_URL_READ)
                .then(res => res.text())
                .then(csvText => {
                    const rows = csvText.split("\n").map(r => r.split(","));
                    const headers = rows[0].map(h => h.trim().replace(/"/g, ""));
                    allData = rows.slice(1).map((row, idx) => {
                        const obj = {id:idx};
                        headers.forEach((h,i) => obj[h] = row[i]?.trim().replace(/"/g, "") || "-");
                        return obj;
                    }).filter(d => d.Bank);

                    renderList(allData);
                    document.getElementById("loading").style.display = "none";
                })
                .catch(err => {
                    document.getElementById("loading").innerHTML = "❌ 讀取失敗：" + err;
                });
        }

        // 篩選功能
        function filterPolicies() {
            const selectedBank = document.getElementById("bankFilter").value;
            renderList(selectedBank ? allData.filter(item => item.Bank === selectedBank) : allData);
        }

        // ✅ 渲染列表：完全對應你指定的欄位，上下分行排版
        function renderList(data) {
            const list = document.getElementById("policyList");
            list.innerHTML = "";

            if (data.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#888; padding:20px;'>No policy records found</p>";
                return;
            }

            data.forEach(item => {
                const color = bankColorMap[item.Bank] || "color-cimb";
                const div = document.createElement("div");
                div.className = `policy-item ${color}`;
                div.innerHTML = `
                    <div style="font-size:16px; font-weight:700; margin-bottom:10px;">${item.Bank} 
                        <span style="float:right; font-size:12px; color:#666; font-weight:400;">Updated: ${item.UPDATED || "-"}</span>
                    </div>
                    <div class="policy-row"><span class="policy-label">PTPTN LATE PAYMENT</span><span class="policy-value">- ${item["PTPTN LATE PAYMENT"]}</span></div>
                    <div class="policy-row"><span class="policy-label">CLEAN CCRIS</span><span class="policy-value">- ${item["CLEAN CCRIS"]}</span></div>
                    <div class="policy-row"><span class="policy-label">FIRST HOME 100% LOAN PACKAGE</span><span class="policy-value">- ${item["FIRST HOME 100% LOAN PACKAGE"]}</span></div>
                    <div class="policy-row"><span class="policy-label">CTOS ISSUE</span><span class="policy-value">- ${item["CTOS ISSUE"]}</span></div>
                    <div class="policy-row"><span class="policy-label">REFERRAL FEES</span><span class="policy-value">- ${item["REFERRAL FEES"]}</span></div>
                    <div class="policy-row"><span class="policy-label">SECOND HOME 100% LOAN PACKAGE</span><span class="policy-value">- ${item["SECOND HOME 100% LOAN PACKAGE"]}</span></div>
                    <div class="policy-row"><span class="policy-label">LA FINANCE</span><span class="policy-value">- ${item["LA FINANCE"]}</span></div>
                    <div class="policy-row"><span class="policy-label">ZERO MOVING COST</span><span class="policy-value">- ${item["ZERO MOVING COST"]}</span></div>
                    <div class="policy-row"><span class="policy-label">RENOVATION LOAN</span><span class="policy-value">- ${item["RENOVATION LOAN"]}</span></div>
                    <div class="policy-row"><span class="policy-label">MINIMUM INCOME</span><span class="policy-value">- ${item["MINIMUM INCOME"]}</span></div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
